spring.application.name=backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/smart_campus_db?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=suhail
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8083

# File Upload configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File Storage Directory (relative to project root)
file.upload-dir=uploads

# OAuth2 Resource Server (Google)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://accounts.google.com
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE

